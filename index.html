<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchValue = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return fetchValue || originalFetch;
            },
            set: function(val) {
              fetchValue = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Failed to define fetch descriptor:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cold-Mailing</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
